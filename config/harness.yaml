# Provider extensions publish the live model list and model metadata at
# runtime. Harness config owns role defaults and extension settings.
# Use `/model <role>` to switch and `/role ...` to edit persisted role
# overrides.

# Optional prompt fragments applied to every role. Fragments are rendered as
# Handlebars templates and sorted by priority together with role-, tool-, and
# extension-provided fragments. Priorities below 100 render before generated
# context such as skills and AGENTS.md.
# promptFragments:
#   - name: user.short-plain-style
#     priority: 65
#     text: Keep answers short and plain, using only simple words.

# Optional role defaults. Built-in roles are merged underneath this map:
# engineer = state-of-the-art default, assistant = fast/lightweight,
# manager = orchestration/delegation.
# Role `description` is shown in `/role ...` completions. Per-role
# `promptFragments` add instructions only for that role. `promptOverride`
# selects a system prompt template. `tools` and `disableTools` customize
# internal tool availability for the role.
# roles:
#   engineer:
#     description: Balanced coding assistant.
#     model: chatgpt/gpt-5.5
#     promptFragments:
#       - name: engineer.careful
#         priority: 80
#         text: You are a careful coding assistant.
#     tools: [read, grep]
#     disableTools: [shell]
#   assistant:
#     effort: off

# Optional built-in extension overrides.
# extensions:
#   core-shell:
#     enable: false
#   provider-openai:
#     enable: false
#   test-dummy:
#     enable: true
{}
